<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mero — Characters</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site-header">
    <span class="game-logo">MERO</span>
    <div class="header-right">
      <span id="header-username" class="header-username"></span>
      <div class="lang-switcher"></div>
      <button class="btn btn-outline btn-sm" onclick="logout()" data-i18n="char.logout">Logout</button>
    </div>
  </header>

  <main>
    <div class="page-toolbar">
      <h2 class="page-title" data-i18n="char.your_heroes">Your Heroes</h2>
      <button class="btn btn-primary" onclick="openCreateModal()" data-i18n="char.new_character">+ New Character</button>
    </div>

    <div class="char-grid" id="char-grid">
      <div class="char-grid-loading" data-i18n="char.loading">Loading…</div>
    </div>
  </main>

  <!-- Create Character Modal -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal">
      <h2 class="modal-title" data-i18n="char.modal_title">Forge a New Hero</h2>

      <!-- Step indicator -->
      <div class="wizard-steps">
        <div class="wizard-step-dot active" id="step-dot-1">1</div>
        <div class="wizard-connector"></div>
        <div class="wizard-step-dot" id="step-dot-2">2</div>
      </div>

      <form id="create-form" onsubmit="handleCreateChar(event)">
        <!-- Step 1: Name + Gender + Avatar -->
        <div id="wizard-step-1">
          <div class="form-group">
            <label for="char-name" data-i18n="char.hero_name">Hero Name</label>
            <input id="char-name" type="text" maxlength="30" data-i18n-ph="char.hero_name_ph" placeholder="Name your hero…" />
          </div>
          <label class="section-label" data-i18n="char.choose_gender">Choose Gender &amp; Avatar</label>
          <div class="gender-tabs">
            <button type="button" class="gender-tab active" data-gender="male" onclick="selectGender(this)">Male</button>
            <button type="button" class="gender-tab" data-gender="female" onclick="selectGender(this)">Female</button>
          </div>
          <div class="avatar-grid" id="avatar-grid">
            <div class="avatar-card selected" data-avatar="/avatars/selection/male_selection_A.png" onclick="selectAvatar(this)">
              <img src="/avatars/selection/male_selection_A.png" alt="Male A" />
            </div>
            <div class="avatar-card" data-avatar="/avatars/selection/male_selection_B.png" onclick="selectAvatar(this)">
              <img src="/avatars/selection/male_selection_B.png" alt="Male B" />
            </div>
          </div>
        </div>

        <!-- Step 2: Class -->
        <div id="wizard-step-2" class="wizard-step-hidden">
          <label class="section-label" data-i18n="char.choose_class">Choose Class</label>
          <div class="class-grid" id="class-grid">
            <div class="class-card selected" data-class="Warrior" onclick="selectClass(this)">
              <div class="icon">⚔️</div>
              <div class="class-name" data-i18n="char.class.warrior">Warrior</div>
            </div>
            <div class="class-card" data-class="Mage" onclick="selectClass(this)">
              <div class="icon">🔮</div>
              <div class="class-name" data-i18n="char.class.mage">Mage</div>
            </div>
            <div class="class-card" data-class="Rogue" onclick="selectClass(this)">
              <div class="icon">🗡️</div>
              <div class="class-name" data-i18n="char.class.rogue">Rogue</div>
            </div>
            <div class="class-card" data-class="Cleric" onclick="selectClass(this)">
              <div class="icon">✝️</div>
              <div class="class-name" data-i18n="char.class.cleric">Cleric</div>
            </div>
          </div>
        </div>

        <div class="error-msg" id="create-error"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" id="wizard-cancel" onclick="closeCreateModal()" data-i18n="char.cancel">Cancel</button>
          <button type="button" class="btn btn-outline wizard-hidden" id="wizard-back" onclick="wizardBack()">← Back</button>
          <button type="button" class="btn btn-primary" id="wizard-next" onclick="wizardNext()">Next →</button>
          <button type="submit" class="btn btn-primary wizard-hidden" id="create-btn" data-i18n="char.create_hero">Create Hero</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/characters.js"></script>
</body>
</html>
