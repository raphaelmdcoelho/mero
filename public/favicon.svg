<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0d0d14"/>
  <rect width="32" height="32" rx="6" fill="none" stroke="#3d2f6e" stroke-width="1"/>

  <!-- Arcane glow behind blade -->
  <ellipse cx="16" cy="13" rx="5" ry="9" fill="url(#glow)"/>

  <!-- Blade body -->
  <rect x="14.5" y="8" width="3" height="12" fill="#c8d6e4"/>
  <!-- Blade tip -->
  <polygon points="14.5,8 17.5,8 16,3" fill="#c8d6e4"/>
  <!-- Blade shine -->
  <rect x="15.5" y="4" width="1" height="14" rx="0.5" fill="#eef5fc" opacity="0.65"/>

  <!-- Crossguard -->
  <rect x="8.5" y="20" width="15" height="2.5" rx="1.25" fill="#facc15"/>
  <rect x="8.5" y="20" width="15" height="1.2" rx="0.6" fill="#fef08a" opacity="0.45"/>

  <!-- Grip -->
  <rect x="14.5" y="22.5" width="3" height="5" rx="1" fill="#4c1d95"/>
  <line x1="14.5" y1="24.5" x2="17.5" y2="24.5" stroke="#7c3aed" stroke-width="0.8"/>
  <line x1="14.5" y1="26"   x2="17.5" y2="26"   stroke="#7c3aed" stroke-width="0.8"/>

  <!-- Pommel -->
  <circle cx="16" cy="29" r="2"   fill="#facc15"/>
  <circle cx="16" cy="28.5" r="1.1" fill="#fef08a" opacity="0.55"/>
</svg>
