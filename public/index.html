<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mero — Login</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- Animated background -->
  <div class="orb-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-wrap">
    <!-- Logo -->
    <div class="game-logo mb-6">MERO</div>
    <p style="color:var(--muted);font-size:0.95rem;margin-bottom:1.5rem;font-style:italic;"
       data-i18n="auth.tagline">An idle adventure awaits…</p>

    <!-- Auth card -->
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="showTab('login')" data-i18n="auth.tab.login">Login</button>
        <button class="auth-tab" id="tab-register" onclick="showTab('register')" data-i18n="auth.tab.register">Register</button>
      </div>

      <!-- Login form -->
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-username" data-i18n="auth.username">Username</label>
          <input id="login-username" type="text" autocomplete="username" data-i18n-ph="auth.hero_placeholder" placeholder="YourHero" required />
        </div>
        <div class="form-group">
          <label for="login-password" data-i18n="auth.password">Password</label>
          <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <div class="error-msg" id="login-error"></div>
        <button type="submit" class="btn btn-primary w-full mt-2" id="login-btn" style="width:100%;margin-top:0.5rem;"
                data-i18n="auth.enter_realm">Enter the Realm</button>
      </form>

      <!-- Register form -->
      <form id="form-register" style="display:none;" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-username">
            <span data-i18n="auth.username">Username</span>
            <span style="color:var(--muted);font-size:0.8rem;" data-i18n="auth.username_hint">(3–20 alphanumeric)</span>
          </label>
          <input id="reg-username" type="text" autocomplete="username" data-i18n-ph="auth.hero_placeholder" placeholder="YourHero" required />
        </div>
        <div class="form-group">
          <label for="reg-password">
            <span data-i18n="auth.password">Password</span>
            <span style="color:var(--muted);font-size:0.8rem;" data-i18n="auth.password_hint">(min 6 chars)</span>
          </label>
          <input id="reg-password" type="password" autocomplete="new-password" placeholder="••••••••" required />
        </div>
        <div class="form-group">
          <label for="reg-confirm" data-i18n="auth.confirm_password">Confirm Password</label>
          <input id="reg-confirm" type="password" autocomplete="new-password" placeholder="••••••••" required />
        </div>
        <div class="error-msg" id="register-error"></div>
        <button type="submit" class="btn btn-primary" id="register-btn" style="width:100%;margin-top:0.5rem;"
                data-i18n="auth.create_account">Create Account</button>
      </form>
    </div>

    <!-- Language switcher -->
    <div class="lang-switcher" style="margin-top:1rem;"></div>

    <p style="color:var(--muted);font-size:0.75rem;margin-top:0.75rem;" data-i18n="auth.footer">
      Mero &copy; 2024 — A browser idle RPG
    </p>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
