<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="64" height="64" fill="#0d0a1a"/>

  <!-- Parchment / scroll base -->
  <rect x="8"  y="10" width="36" height="44" fill="#c8b88a"/>
  <rect x="8"  y="10" width="36" height="4"  fill="#b0a070"/>
  <rect x="8"  y="50" width="36" height="4"  fill="#b0a070"/>
  <!-- Scroll curls -->
  <rect x="6"  y="10" width="4"  height="44" fill="#a09060"/>
  <rect x="40" y="10" width="4"  height="44" fill="#a09060"/>

  <!-- Rune lines on parchment -->
  <rect x="12" y="18" width="16" height="2" fill="#5a4a2a"/>
  <rect x="12" y="23" width="20" height="2" fill="#5a4a2a"/>
  <rect x="12" y="28" width="12" height="2" fill="#5a4a2a"/>
  <rect x="12" y="33" width="18" height="2" fill="#5a4a2a"/>
  <rect x="12" y="38" width="14" height="2" fill="#5a4a2a"/>

  <!-- Glowing rune symbol -->
  <rect x="28" y="28" width="4"  height="10" fill="#c084fc" opacity="0.9"/>
  <rect x="24" y="32" width="12" height="4"  fill="#c084fc" opacity="0.9"/>
  <rect x="26" y="26" width="8"  height="2"  fill="#c084fc" opacity="0.6"/>
  <rect x="26" y="40" width="8"  height="2"  fill="#c084fc" opacity="0.6"/>

  <!-- Magnifying glass handle -->
  <rect x="46" y="46" width="4"  height="12" fill="#7a6a5a" style="transform:rotate(-45deg);transform-origin:46px 46px"/>
  <rect x="44" y="44" width="3"  height="10" fill="#7a6a5a"/>
  <rect x="47" y="47" width="3"  height="10" fill="#5a4a3a"/>

  <!-- Magnifying glass circle -->
  <rect x="36" y="30" width="20" height="20" fill="none"/>
  <!-- Circle approximated with rects -->
  <rect x="40" y="30" width="12" height="2"  fill="#a09080"/>
  <rect x="40" y="48" width="12" height="2"  fill="#a09080"/>
  <rect x="36" y="34" width="2"  height="12" fill="#a09080"/>
  <rect x="54" y="34" width="2"  height="12" fill="#a09080"/>
  <rect x="38" y="32" width="4"  height="2"  fill="#a09080"/>
  <rect x="50" y="32" width="4"  height="2"  fill="#a09080"/>
  <rect x="38" y="46" width="4"  height="2"  fill="#a09080"/>
  <rect x="50" y="46" width="4"  height="2"  fill="#a09080"/>
  <!-- Lens fill with glow tint -->
  <rect x="38" y="32" width="16" height="16" fill="#c084fc" opacity="0.12"/>
  <rect x="40" y="34" width="4"  height="4"  fill="#ffffff" opacity="0.15"/>
</svg>
