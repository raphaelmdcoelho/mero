<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="64" height="64" fill="#1a0e05"/>

  <!-- Table surface -->
  <rect x="4"  y="50" width="56" height="6"  fill="#5d3a1a"/>
  <rect x="4"  y="48" width="56" height="4"  fill="#7a4a20"/>
  <rect x="8"  y="54" width="4"  height="10" fill="#5d3a1a"/>
  <rect x="52" y="54" width="4"  height="10" fill="#5d3a1a"/>

  <!-- Mug body -->
  <rect x="20" y="24" width="20" height="26" fill="#c8a050"/>
  <rect x="20" y="24" width="20" height="3"  fill="#a07830"/>
  <rect x="20" y="46" width="20" height="4"  fill="#a07830"/>

  <!-- Mug highlight -->
  <rect x="22" y="27" width="4"  height="18" fill="#e0b860" opacity="0.5"/>

  <!-- Mug handle -->
  <rect x="40" y="28" width="6"  height="3"  fill="#a07830"/>
  <rect x="44" y="31" width="4"  height="10" fill="#a07830"/>
  <rect x="40" y="41" width="6"  height="3"  fill="#a07830"/>
  <rect x="42" y="30" width="2"  height="12" fill="#c8a050"/>

  <!-- Beer foam -->
  <rect x="18" y="18" width="24" height="8"  fill="#f0ead0"/>
  <rect x="16" y="20" width="4"  height="6"  fill="#f0ead0"/>
  <rect x="40" y="20" width="4"  height="6"  fill="#f0ead0"/>
  <rect x="22" y="16" width="6"  height="4"  fill="#f0ead0"/>
  <rect x="34" y="16" width="6"  height="4"  fill="#f0ead0"/>

  <!-- Foam bubbles -->
  <rect x="24" y="14" width="4"  height="4"  fill="#fff8e8"/>
  <rect x="36" y="14" width="4"  height="4"  fill="#fff8e8"/>
  <rect x="30" y="12" width="4"  height="4"  fill="#fff8e8"/>

  <!-- Candle (left) -->
  <rect x="6"  y="36" width="4"  height="14" fill="#e8d090"/>
  <rect x="6"  y="34" width="4"  height="4"  fill="#d0b878"/>
  <rect x="7"  y="30" width="2"  height="6"  fill="#c08820"/>
  <rect x="7"  y="28" width="2"  height="3"  fill="#ff8c00"/>
  <rect x="6"  y="26" width="4"  height="3"  fill="#ffcc00" opacity="0.7"/>

  <!-- Candle (right) -->
  <rect x="54" y="36" width="4"  height="14" fill="#e8d090"/>
  <rect x="54" y="34" width="4"  height="4"  fill="#d0b878"/>
  <rect x="55" y="30" width="2"  height="6"  fill="#c08820"/>
  <rect x="55" y="28" width="2"  height="3"  fill="#ff8c00"/>
  <rect x="54" y="26" width="4"  height="3"  fill="#ffcc00" opacity="0.7"/>
</svg>
